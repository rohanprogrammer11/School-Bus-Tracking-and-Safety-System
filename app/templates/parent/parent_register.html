<!DOCTYPE html>
<html>
<head>
    <title>Parent Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 30px;
        }

        .card {
            max-width: 450px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
        }

        input, select {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
        }

        .hidden {
            display: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1d3557;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

                /* PASSWORD TOGGLE */

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 10px;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }


        .alert.error {
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }

        .alert.success {
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }

        textarea {
            width: 94%;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            margin-bottom: 15px;
            resize: vertical;
        }

        .field-error {
            color: #dc3545;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 12px;
        }

        input.error-input,
        textarea.error-input {
            border-color: #dc3545;
            background-color: #fff5f5;
        }


    </style>
</head>
<body>

<div class="card">
    <h2>👨‍👩‍👧 Parent Registration</h2>

    <form method="POST">

        <input name="name" placeholder="Parent Name" required>
        <input name="email" type="email" placeholder="Email" required>
        <input name="phone" placeholder="Phone" required>

        <!-- SCHOOL SELECT -->
<label><strong>Select School / College</strong></label>

<select name="org_id" required>
    <option value="">-- Select School --</option>
    {% for org in organizations %}
        <option value="{{ org.id }}">{{ org.org_name }}</option>
    {% endfor %}
</select>

        <!-- MANUAL SCHOOL INPUT -->
        <input
            type="text"
            name="manual_school"
            id="manualSchool"
            class="hidden"
            placeholder="Enter School Name"
        >

        <hr>

        <h4>Student Details (Optional)</h4>
        <input name="student_name" placeholder="Student Name (optional)">
        <input name="rfid_tag" placeholder="Student RFID (optional)">
        <input name="qr_code" placeholder="Student QR Code (optional)">

        <hr>

            <!-- PASSWORD -->
            <label for="password">Password</label>

            <div class="password-wrapper">
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Create a strong password"
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}$"
                    title="Password must be at least 8 characters, include uppercase, lowercase, number and special character"
                    required
                >
                 <img
                    src="{{ url_for('static', filename='images/eye-closed.png') }}"
                    id="toggleIcon"
                    class="toggle-password"
                    onclick="togglePassword()"
                    alt="Toggle Password"
                >
    
            </div>

        <button type="submit">Register</button>
    </form>
</div>

<script>
function toggleSchoolInput() {
    const select = document.getElementById("schoolSelect");
    const manual = document.getElementById("manualSchool");

    if (select.value === "OTHER") {
        manual.classList.remove("hidden");
        manual.required = true;
    } else {
        manual.classList.add("hidden");
        manual.required = false;
        manual.value = "";
    }
}
</script>

<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    const icon = document.getElementById("toggleIcon");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        icon.src = "{{ url_for('static', filename='images/eye-open.png') }}";
    } else {
        passwordInput.type = "password";
        icon.src = "{{ url_for('static', filename='images/eye-closed.png') }}";
    }
}
</script>


</body>
</html>
