<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | School Bus Safety System</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .page-header h1 {
            font-size: 24px;
        }

        .back-btn {
            background: #e5e7eb;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            background: #ffffff;
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
            border-left: 5px solid #4caf50;
        }

        .message.unread {
            border-left-color: #ff9800;
            background: #fffdf7;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message-header h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .message-header time {
            font-size: 12px;
            color: #6b7280;
        }

        .message-body {
            margin-top: 6px;
            font-size: 14px;
            line-height: 1.5;
            color: #374151;
        }

        .location-link {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 12px;
            background: #0d6efd;
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            text-decoration: none;
        }

        .location-link:hover {
            background: #0b5ed7;
        }

        .no-notifications {
            font-size: 14px;
            color: #6b7280;
            font-style: italic;
        }
    </style>
</head>

<body>

<main class="container">

    <header class="page-header">
        <button class="back-btn" onclick="history.back()">← Back</button>
        <h1>🔔 Notifications</h1>
    </header>

    <section class="messages">

        {% if notifications %}
            {% for n in notifications %}
                <article class="message {{ 'unread' if n.is_read == 0 else 'read' }}">

                    <header class="message-header">
                        <h2>{{ n.title }}</h2>
                        <time>{{ n.event_time }}</time>
                    </header>

                    <p class="message-body">
                        {{ n.message }}
                    </p>

                    {% if n.latitude and n.longitude %}
                        <a href="/org/view-location/{{ n.id }}"
                           class="location-link"
                           target="_blank">
                            📍 View Location
                        </a>
                    {% endif %}

                </article>
            {% endfor %}
        {% else %}
            <p class="no-notifications">No notifications yet.</p>
        {% endif %}

    </section>

</main>

</body>
</html>
