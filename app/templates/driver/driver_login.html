<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driver Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 30px 25px;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #343a40;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #495057;
        }

        input {
            width: 95%;
            padding: 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            outline: none;
        }

        input:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 11px;
            margin-top: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .back-link {
            display: block;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .back-link a {
            color: #007bff;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

                                /* PASSWORD TOGGLE */

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 10px;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 55%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .alert.error {
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }

        .field-error {
            color: #dc3545;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 12px;
        }

    </style>
</head>
<body>

<div class="login-box">
    <h2>Driver Login</h2>

    <form method="POST">
        <div class="form-group">
            <label>Email or Phone</label>
            <input type="text" name="identifier" placeholder="Enter email or phone" required>
        </div>

<div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="Enter password" required>
                
                 <img
                    src="{{ url_for('static', filename='images/eye-closed.png') }}"
                    id="toggleIcon"
                    class="toggle-password"
                    onclick="togglePassword()"
                    alt="Toggle Password"
                >
    
            </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <button type="submit">Login</button>
    </form>

    <div class="back-link">
        <a href="/">← Back to Home</a>
    </div>
</div>
<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    const icon = document.getElementById("toggleIcon");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        icon.src = "{{ url_for('static', filename='images/eye-open.png') }}";
    } else {
        passwordInput.type = "password";
        icon.src = "{{ url_for('static', filename='images/eye-closed.png') }}";
    }
}
</script>

</body>
</html>
