<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Bus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            background:#f8f9fa;
            font-family:Arial, Helvetica, sans-serif;
        }
        .container{
            max-width:600px;
            margin:40px auto;
            background:#fff;
            padding:25px;
            border-radius:6px;
        }
        h3{
            margin-top:0;
        }
        label{
            display:block;
            margin-top:12px;
            font-weight:bold;
        }
        input, select{
            width:100%;
            padding:8px;
            margin-top:5px;
        }
        .btn{
            margin-top:18px;
            padding:8px 14px;
            border:none;
            cursor:pointer;
            border-radius:4px;
        }
        .btn-primary{
            background:#0d6efd;
            color:#fff;
        }
        .btn-secondary{
            background:#6c757d;
            color:#fff;
            text-decoration:none;
            padding:8px 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/org/buses" class="btn-secondary">⬅ Back</a>
    <br><br>

    <h3>✏️ Edit Bus</h3>

    <form method="post">

        <label>Bus Code</label>
        <input type="text" name="bus_code" value="{{ bus.bus_code }}" required>

        <label>Bus Number</label>
        <input type="text" name="bus_number" value="{{ bus.bus_number }}" required>

        <label>Bus Model</label>
        <input type="text" name="bus_model" value="{{ bus.bus_model }}">

        <label>Capacity</label>
        <input type="number" name="capacity" value="{{ bus.capacity }}" required>

        <label>Fuel Type</label>
        <select name="fuel_type" required>
            <option value="DIESEL" {% if bus.fuel_type=='DIESEL' %}selected{% endif %}>Diesel</option>
            <option value="PETROL" {% if bus.fuel_type=='PETROL' %}selected{% endif %}>Petrol</option>
            <option value="CNG" {% if bus.fuel_type=='CNG' %}selected{% endif %}>CNG</option>
        </select>

        <label>Mileage (km/l)</label>
        <input type="number" step="0.01" name="mileage_kmpl" value="{{ bus.mileage_kmpl }}" required>

        <label>Status</label>
        <select name="status">
            <option value="ACTIVE" {% if bus.status=='ACTIVE' %}selected{% endif %}>ACTIVE</option>
            <option value="INACTIVE" {% if bus.status=='INACTIVE' %}selected{% endif %}>INACTIVE</option>
            <option value="MAINTENANCE" {% if bus.status=='MAINTENANCE' %}selected{% endif %}>MAINTENANCE</option>
        </select>

        <button class="btn btn-primary" type="submit">
            Save Changes
        </button>
    </form>

</div>

</body>
</html>
