<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
        body { margin: 0; background-color: #f8f9fa; }

        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 { margin-bottom: 25px; color: #212529; }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 14px;
            font-size: 14px;
            text-decoration: none;
            border-radius: 5px;
            background-color: #6c757d;
            color: #fff;
        }

        .card {
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .add-form {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        input, select {
            padding: 10px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ced4da;
            width: 100%;
        }

        .btn-add {
            background-color: #0d6efd;
            padding: 12px;
            font-size: 15px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            color: #fff;
            grid-column: span 4;
        }

        .btn-add:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/org/students" class="back-btn">← Back to Students</a>
    <h2>Add Student</h2>

    <div class="card">
        <form method="POST" class="add-form">
            <input name="name" placeholder="Student Name" required>
            <input name="roll_no" placeholder="Roll No" required>
            <input name="rfid_tag" placeholder="Student ID / RFID">
            <input name="qr_code" placeholder="QR Code">

            <select name="class_id" required>
                <option value="">Select Class</option>
                {% for c in classes %}
                <option value="{{ c.id }}">{{ c.std }} {{ c.division }}</option>
                {% endfor %}
            </select>

            <select name="parent_id">
                <option value="">Select Parent</option>
                {% for p in parents %}
                <option value="{{ p.id }}">{{ p.name }}</option>
                {% endfor %}
            </select>

            <select name="bus_id" id="bus_id">
                <option value="">Select Bus</option>
                {% for b in buses %}
                <option value="{{ b.id }}">{{ b.bus_number }}</option>
                {% endfor %}
            </select>

            <input id="route_name" name="route_name" placeholder="Route Name" readonly>
            <input id="driver_name" name="driver_name" placeholder="Assigned Driver" readonly>
            <input id="pickup_time" name="pickup_time" placeholder="Pickup Time" readonly>
            <input id="drop_time" name="drop_time" placeholder="Drop Time" readonly>


            <select name="assigned_stop_id" id="assigned_stop_id">
                <option value="">Select Stop</option>
            </select>

            <input id="monthly_fee"
                name="monthly_fee"
                placeholder="Monthly Bus Fee"
                readonly
                style="background:#f1f3f5; font-weight:600;">


            <button type="submit" class="btn-add">Add Student</button>
        </form>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const busSelect   = document.getElementById("bus_id");
    const routeInput  = document.getElementById("route_name");
    const driverInput = document.getElementById("driver_name");
    const pickupInput = document.getElementById("pickup_time");
    const dropInput   = document.getElementById("drop_time");
    const stopSelect  = document.getElementById("assigned_stop_id");
    const feeInput    = document.getElementById("monthly_fee");

    busSelect.addEventListener("change", function () {
        const busId = this.value;

        routeInput.value = "";
        driverInput.value = "";
        pickupInput.value = "";
        dropInput.value = "";
        feeInput.value = "";
        stopSelect.innerHTML = '<option value="">Select Stop</option>';

        if (!busId) return;

        fetch(`/org/students/get-bus-details/${busId}`)
            .then(res => res.json())
            .then(data => {

                routeInput.value  = data.route_name || "-";
                driverInput.value = data.driver_name || "-";
                pickupInput.value = data.pickup_time?.substring(0,5) || "-";
                dropInput.value   = data.drop_time?.substring(0,5) || "-";

                if (Array.isArray(data.stops)) {
                    data.stops.forEach(stop => {
                        const opt = document.createElement("option");
                        opt.value = stop.id;
                        opt.textContent = stop.stop_name;
                        stopSelect.appendChild(opt);
                    });
                }
            });
    });

    // 🔥 NEW: Load fee on stop select
    stopSelect.addEventListener("change", function () {
        const stopId = this.value;
        feeInput.value = "";

        if (!stopId) return;

        fetch(`/org/students/get-stop-fee/${stopId}`)
            .then(res => res.json())
            .then(data => {
                feeInput.value = data.monthly_fee > 0
                    ? "₹ " + data.monthly_fee.toFixed(2)
                    : "Not Set";
            });
    });

});
</script>

</body>
</html>
