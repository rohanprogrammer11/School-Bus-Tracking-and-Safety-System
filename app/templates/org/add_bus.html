<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Bus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 15px;
        }

        .center-wrapper {
            display: flex;
            justify-content: center;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        .card-header {
            background-color: #212529;
            color: #ffffff;
            padding: 15px 20px;
        }

        .card-header h5 {
            margin: 0;
            font-size: 16px;
        }

        .card-body {
            padding: 20px;
        }

        /* Form */
        .mb-3 {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0d6efd;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 14px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: #ffffff;
        }

        .btn-success {
            background-color: #198754;
            color: #ffffff;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="center-wrapper">
        <div class="card">

            <div class="card-header">
                <h5>🚌 Add New Bus</h5>
            </div>

            <div class="card-body">
                <form method="POST">

                    <!-- BUS CODE (ORG DEFINED) -->
                    <div class="mb-3">
                        <label>Bus Code</label>
                        <input type="text" name="bus_code"
                               placeholder="BUS-01"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Bus Number</label>
                        <input type="text" name="bus_number"
                               placeholder="MH-12-AB-1234"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Bus Model</label>
                        <input type="text" name="bus_model"
                               placeholder="Tata / Ashok Leyland"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Capacity</label>
                        <input type="number" name="capacity"
                               placeholder="40"
                               min="1"
                               required>
                    </div>

                    <div>
                        <label>Fuel Type</label>
                        <select name="fuel_type" required>
                            <option value="DIESEL">Diesel</option>
                            <option value="PETROL">Petrol</option>
                            <option value="CNG">CNG</option>
                        </select>
                    </div>

                    <div>
                        <label>Mileage (km per unit)</label>
                        <input type="number" step="0.1" name="mileage_kmpl" required>
                    </div>

                    <div class="mb-3">
                        <label>Status</label>
                        <select name="status">
                            <option value="ACTIVE">ACTIVE</option>
                            <option value="INACTIVE">INACTIVE</option>
                            <option value="MAINTENANCE">MAINTENANCE</option>
                        </select>
                    </div>

                    <div class="btn-row">
                        <a href="/org/buses" class="btn btn-secondary">
                            ⬅ Back
                        </a>
                        <button type="submit" class="btn btn-success">
                            ➕ Add Bus
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>

</div>

</body>
</html>
