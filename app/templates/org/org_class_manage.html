<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            margin-bottom: 25px;
            color: #212529;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 14px;
            font-size: 14px;
            text-decoration: none;
            border-radius: 5px;
            background-color: #6c757d;
            color: #fff;
        }

        .card {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        input {
            padding: 10px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ced4da;
            width: 200px;
        }

        button {
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            color: #fff;
        }

        .btn-add {
            background-color: #0d6efd;
        }

        .btn-delete {
            background-color: #dc3545;
            padding: 6px 12px;
            font-size: 13px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #212529;
            color: #fff;
        }

        .count-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            background-color: #0d6efd;
            color: #fff;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/org/dashboard" class="back-btn">← Back to Dashboard</a>

    <h2>Class Management</h2>

    <!-- ADD CLASS -->
    <div class="card">
        <form method="POST">
            <input name="std" placeholder="Class (e.g. 5)" required>
            <input name="division" placeholder="Division (A/B)">
            <button type="submit" class="btn-add">Add Class</button>
        </form>
    </div>

    <!-- CLASS LIST -->
    <div class="card">
        <table>
            <tr>
                <th>Class</th>
                <th>Division</th>
                <th>Students</th>
                <th>Action</th>
            </tr>

            {% for c in classes %}
            <tr>
                <td>{{ c.std }}</td>
                <td>{{ c.division if c.division else '-' }}</td>
                <td>
                    <span class="count-badge">{{ c.student_count }}</span>
                </td>
                <td>
                    <form
                        method="POST"
                        action="/org/classes/delete/{{ c.id }}"
                        onsubmit="return confirm('Are you sure you want to delete this class?');"
                        style="margin:0;"
                    >
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

</body>
</html>
