<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Send Notice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at top left, #f8fbff, #eef2f7);
}

* {
    box-sizing: border-box;
}


.page-center {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;     /* CENTER everything */
    padding-top: 60px;
}

.notice-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 18px;
    color: #1f2937;
    text-align: center;
}

.notice-card {
    background: #ffffff;
    border-radius: 14px;
    box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.08),
        0 2px 6px rgba(0, 0, 0, 0.05);
    padding: 28px;
    width: 380px;
}


        /* Heading */
        .notice-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1f2937;
        }

        /* Card */
        .notice-card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow:
                0 12px 30px rgba(0, 0, 0, 0.08),
                0 2px 6px rgba(0, 0, 0, 0.05);
            padding: 30px;
            width: 400px;
        }

        /* Labels */
        label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        /* Inputs */
        select,
        input,
        textarea {
            width: 100%;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            padding: 11px 14px;
            font-size: 14px;
            transition: 0.2s;
            outline: none;
        }

        select:focus,
        input:focus,
        textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        textarea {
            resize: none;
        }

        /* Button */
        .notice-btn {
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .notice-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(37, 99, 235, 0.35);
        }

        .toast {
    position: fixed;
    top: 30px;
    right: 30px;
    background: #16a34a;
    color: white;
    padding: 14px 22px;
    border-radius: 10px;
    font-weight: 600;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: slideIn 0.4s ease, fadeOut 0.4s ease 3s forwards;
    z-index: 9999;
}

.toast.success {
    background: linear-gradient(135deg, #22c55e, #16a34a);
}

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: translateX(100%);
    }
}

.back-btn {
    display: inline-block;
    margin-bottom: 14px;
    font-size: 14px;
    font-weight: 600;
    color: #2563eb;
    text-decoration: none;
    transition: 0.2s;
}

.back-btn:hover {
    text-decoration: underline;
    color: #1d4ed8;
}


    </style>
</head>

<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="toast {{ category }}">
          {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}


<div class="page-center">

    <h2 class="notice-title">📢 Send Notice</h2>

    <form method="POST" class="notice-card">
        <a href="/org/dashboard" class="back-btn">← Back to Dashboard</a>
         <button type="submit" class="notice-btn">
            Send Notice
        </button>
        <label>Send To</label>
        <select name="target_role" required>
            <option value="driver">Drivers</option>
            <option value="parent">Parents</option>
            <option value="both">Drivers & Parents</option>
        </select>
        <br><br>

        <label>Title</label>
        <input type="text" name="title" required>
        <br><br>

        <label>Message</label>
        <textarea name="message" rows="5" required></textarea>

        <button type="submit" class="notice-btn">
            Send Notice
        </button>
    </form>

</div>

</body>
</html>
